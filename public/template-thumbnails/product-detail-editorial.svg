<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <rect width="320" height="200" rx="8" fill="#f8f7f4"/>
  <!-- Hero image -->
  <rect x="0" y="0" width="320" height="110" rx="8" fill="#d4cfc5"/>
  <rect x="130" y="40" width="60" height="30" rx="4" fill="#b5aea4"/>
  <!-- Overlay gradient hint -->
  <rect x="0" y="60" width="320" height="50" rx="0" fill="url(#grad)" opacity="0.5"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <!-- Floating card -->
  <rect x="40" y="90" width="240" height="90" rx="8" fill="#ffffff" stroke="#e5e1d8" stroke-width="1"/>
  <rect x="56" y="104" width="120" height="10" rx="5" fill="#c4bfb5"/>
  <rect x="56" y="120" width="80" height="10" rx="5" fill="#a09890"/>
  <rect x="56" y="140" width="80" height="10" rx="5" fill="#6f6259"/>
  <rect x="56" y="158" width="100" height="20" rx="5" fill="#8c4319"/>
  <!-- Label -->
  <text x="160" y="193" font-family="sans-serif" font-size="10" fill="#a09890" text-anchor="middle">ProductDetail — Editorial</text>
</svg>
