<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <rect width="200" height="120" fill="#f8fafc" rx="8"/>
  <!-- Card central -->
  <rect x="32" y="18" width="136" height="70" fill="#e2e8f0" rx="6"/>
  <!-- Comillas -->
  <text x="50" y="52" font-size="22" fill="#94a3b8" font-family="Georgia, serif">"</text>
  <!-- Líneas de quote -->
  <rect x="56" y="36" width="80" height="4" fill="#cbd5e1" rx="2"/>
  <rect x="56" y="44" width="64" height="4" fill="#cbd5e1" rx="2"/>
  <rect x="56" y="52" width="72" height="4" fill="#cbd5e1" rx="2"/>
  <!-- Separador autor -->
  <rect x="50" y="64" width="100" height="1" fill="#e2e8f0"/>
  <!-- Avatar -->
  <circle cx="60" cy="74" r="6" fill="#c7d2fe"/>
  <!-- Nombre -->
  <rect x="72" y="70" width="40" height="4" fill="#94a3b8" rx="2"/>
  <rect x="72" y="77" width="28" height="3" fill="#cbd5e1" rx="1.5"/>
  <!-- Flecha izquierda -->
  <circle cx="18" cy="53" r="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <polyline points="21,49 16,53 21,57" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Flecha derecha -->
  <circle cx="182" cy="53" r="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <polyline points="179,49 184,53 179,57" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dots indicadores -->
  <circle cx="91" cy="102" r="3" fill="#6366f1"/>
  <circle cx="100" cy="102" r="2" fill="#e2e8f0"/>
  <circle cx="109" cy="102" r="2" fill="#e2e8f0"/>
  <!-- Label -->
  <text x="100" y="114" font-size="7" fill="#64748b" text-anchor="middle" font-family="sans-serif">Carrusel</text>
</svg>
