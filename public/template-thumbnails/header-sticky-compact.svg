<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 320 180" fill="none">
  <!-- Background -->
  <rect width="320" height="180" fill="#F8F7F4"/>
  <!-- Sticky header band (more compact) -->
  <rect width="320" height="44" fill="#FFFFFF" opacity="0.97"/>
  <rect width="320" height="1" y="43" fill="#E5E3DF"/>
  <!-- Backdrop blur hint -->
  <rect width="320" height="44" fill="url(#blur)" opacity="0.4"/>
  <!-- Logo small left -->
  <rect x="16" y="14" width="40" height="16" rx="3" fill="#D97706" opacity="0.2"/>
  <text x="36" y="26" font-family="serif" font-size="9" font-weight="700" fill="#D97706" text-anchor="middle">LOGO</text>
  <!-- Nav pills (desktop) -->
  <rect x="64" y="16" width="28" height="12" rx="3" fill="#F3F2EF"/>
  <rect x="98" y="16" width="36" height="12" rx="3" fill="#F3F2EF"/>
  <rect x="140" y="16" width="28" height="12" rx="3" fill="#F3F2EF"/>
  <!-- Search inline compact -->
  <rect x="176" y="14" width="88" height="16" rx="8" fill="#F3F2EF" stroke="#E5E3DF" stroke-width="1"/>
  <circle cx="186" cy="22" r="4" stroke="#9CA3AF" stroke-width="1.2" fill="none"/>
  <line x1="189" y1="25" x2="192" y2="28" stroke="#9CA3AF" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Cart -->
  <path d="M280 16 h5 l2.5 10 h-10 z" stroke="#9CA3AF" stroke-width="1.2" fill="none" stroke-linejoin="round"/>
  <circle cx="284" cy="28" r="1.5" fill="#9CA3AF"/>
  <circle cx="288" cy="28" r="1.5" fill="#9CA3AF"/>
  <!-- Sticky badge -->
  <rect x="272" y="4" width="24" height="10" rx="3" fill="#D97706" opacity="0.8"/>
  <text x="284" y="12" font-family="sans-serif" font-size="6" font-weight="600" fill="white" text-anchor="middle">sticky</text>
  <!-- Page scrolled content -->
  <rect x="24" y="60" width="272" height="10" rx="2" fill="#E9E7E2"/>
  <rect x="24" y="78" width="220" height="8" rx="2" fill="#E9E7E2"/>
  <rect x="24" y="94" width="250" height="8" rx="2" fill="#E9E7E2"/>
  <rect x="24" y="110" width="180" height="8" rx="2" fill="#E9E7E2"/>
  <rect x="24" y="126" width="230" height="8" rx="2" fill="#E9E7E2"/>
  <!-- Label -->
  <text x="160" y="165" font-family="sans-serif" font-size="10" fill="#9CA3AF" text-anchor="middle">Sticky Compacto</text>
</svg>
