<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 320 180" fill="none">
  <rect width="320" height="180" fill="#F8F8F8"/>
  <!-- Header strip -->
  <rect x="0" y="0" width="320" height="4" fill="#E5E7EB"/>
  <!-- Newsletter banner -->
  <rect x="0" y="4" width="320" height="44" fill="#4F46E5" rx="0"/>
  <!-- Mail icon -->
  <rect x="16" y="16" width="12" height="10" rx="2" fill="white" fill-opacity="0.7"/>
  <polyline points="16,16 22,22 28,16" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.7"/>
  <!-- Newsletter text -->
  <rect x="34" y="16" width="80" height="5" rx="1" fill="white" fill-opacity="0.9"/>
  <rect x="34" y="25" width="60" height="3" rx="1" fill="white" fill-opacity="0.5"/>
  <!-- Email input -->
  <rect x="152" y="14" width="100" height="18" rx="3" fill="white" fill-opacity="0.15" stroke="white" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="156" y="20" width="50" height="4" rx="1" fill="white" fill-opacity="0.4"/>
  <!-- Submit button -->
  <rect x="256" y="14" width="48" height="18" rx="3" fill="white"/>
  <rect x="262" y="20" width="28" height="4" rx="1" fill="#4F46E5"/>
  <!-- Body columns -->
  <!-- Col 1: logo -->
  <rect x="16" y="62" width="36" height="7" rx="1" fill="#9CA3AF"/>
  <rect x="16" y="74" width="56" height="3" rx="1" fill="#D1D5DB"/>
  <rect x="16" y="80" width="48" height="3" rx="1" fill="#D1D5DB"/>
  <!-- Social circles -->
  <circle cx="20" cy="96" r="5" fill="#E5E7EB"/>
  <circle cx="32" cy="96" r="5" fill="#E5E7EB"/>
  <circle cx="44" cy="96" r="5" fill="#E5E7EB"/>
  <!-- Col 2 -->
  <rect x="100" y="62" width="44" height="5" rx="1" fill="#6B7280"/>
  <rect x="100" y="72" width="40" height="3" rx="1" fill="#D1D5DB"/>
  <rect x="100" y="78" width="36" height="3" rx="1" fill="#D1D5DB"/>
  <rect x="100" y="84" width="42" height="3" rx="1" fill="#D1D5DB"/>
  <!-- Col 3 -->
  <rect x="184" y="62" width="44" height="5" rx="1" fill="#6B7280"/>
  <rect x="184" y="72" width="38" height="3" rx="1" fill="#D1D5DB"/>
  <rect x="184" y="78" width="44" height="3" rx="1" fill="#D1D5DB"/>
  <rect x="184" y="84" width="36" height="3" rx="1" fill="#D1D5DB"/>
  <!-- Col 4 -->
  <rect x="264" y="62" width="40" height="5" rx="1" fill="#6B7280"/>
  <rect x="264" y="72" width="36" height="3" rx="1" fill="#D1D5DB"/>
  <rect x="264" y="78" width="40" height="3" rx="1" fill="#D1D5DB"/>
  <!-- Divider -->
  <line x1="16" y1="112" x2="304" y2="112" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Legal + copyright -->
  <rect x="16" y="120" width="50" height="3" rx="1" fill="#D1D5DB"/>
  <rect x="70" y="120" width="44" height="3" rx="1" fill="#D1D5DB"/>
  <rect x="204" y="120" width="100" height="3" rx="1" fill="#D1D5DB"/>
  <!-- Label -->
  <text x="160" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF" font-weight="500">Con Newsletter</text>
</svg>
