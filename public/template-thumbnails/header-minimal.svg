<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 320 180" fill="none">
  <!-- Background -->
  <rect width="320" height="180" fill="#F8F7F4"/>
  <!-- Header bar (thin, clean) -->
  <rect width="320" height="52" fill="#FFFFFF"/>
  <rect width="320" height="1" y="51" fill="#E5E3DF"/>
  <!-- Logo left  elegant serif style -->
  <text x="24" y="33" font-family="serif" font-size="16" font-weight="700" fill="#1A1814" letter-spacing="2">MARCA</text>
  <!-- Cart only, right -->
  <path d="M282 22 h6 l3 12 h-12 z" stroke="#6B6960" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
  <circle cx="287" cy="36" r="1.5" fill="#6B6960"/>
  <circle cx="292" cy="36" r="1.5" fill="#6B6960"/>
  <!-- No nav, no search  white space emphasis -->
  <!-- Content area - editorial style -->
  <rect x="80" y="72" width="160" height="3" rx="1.5" fill="#D1CFC8"/>
  <rect x="40" y="88" width="240" height="16" rx="2" fill="#1A1814" opacity="0.06"/>
  <text x="160" y="101" font-family="serif" font-size="11" fill="#6B6960" text-anchor="middle">Solo lo esencial.</text>
  <rect x="80" y="116" width="160" height="3" rx="1.5" fill="#D1CFC8"/>
  <!-- Dots decoration -->
  <circle cx="152" cy="138" r="2" fill="#D97706" opacity="0.4"/>
  <circle cx="160" cy="138" r="2" fill="#D97706" opacity="0.7"/>
  <circle cx="168" cy="138" r="2" fill="#D97706" opacity="0.4"/>
  <!-- Label -->
  <text x="160" y="165" font-family="sans-serif" font-size="10" fill="#9CA3AF" text-anchor="middle">Minimal</text>
</svg>
